<!DOCTYPE html>
<html lang="en">
<head>
    <!--
        HealthLink 2035 – Smart Hospital Management System
        PatientRegistration.html
        Purpose: Captures patient demographic information and submits
                 it to RegisterServlet for database insertion.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration – HealthLink 2035</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-icon">🏥</span>
            <span class="brand-text">HealthLink <span class="brand-year">2035</span></span>
        </div>
        <ul class="nav-links">
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/PatientRegistration.html" class="active">Register Patient</a></li>
            <li><a href="/AppointmentScheduling.html">Appointments</a></li>
            <li><a href="/VitalsEntry.html">Vitals</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="form-container">
            <div class="form-header">
                <h1>Patient Registration</h1>
                <p>Enter patient details to register in the system</p>
            </div>

            <!-- Patient Registration Form -->
            <form action="/RegisterPatient" method="POST"
                  onsubmit="return validatePatientForm()">

                <!-- Full Name -->
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name"
                           placeholder="Enter patient full name" required>
                </div>

                <!-- Date of Birth -->
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <!-- Gender -->
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">-- Select Gender --</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone"
                           placeholder="Enter 10-digit phone number" required>
                </div>

                <!-- Address -->
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" rows="3"
                              placeholder="Enter full address" required></textarea>
                </div>

                <!-- Submit -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        Register Patient
                    </button>
                    <button type="reset" class="btn btn-secondary">
                        Clear Form
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2035 HealthLink Smart Hospital Management System. All rights reserved.</p>
    </footer>

    <!-- Validation Script -->
    <script src="js/validation.js"></script>
</body>
</html>
