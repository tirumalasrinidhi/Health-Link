<!DOCTYPE html>
<html lang="en">
<head>
    <!--
        HealthLink 2035 – Smart Hospital Management System
        VitalsEntry.html
        Purpose: Records patient vital signs (heart rate, blood pressure,
                 temperature) and submits to VitalsServlet.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitals Entry – HealthLink 2035</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-icon">🏥</span>
            <span class="brand-text">HealthLink <span class="brand-year">2035</span></span>
        </div>
        <ul class="nav-links">
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/PatientRegistration.html">Register Patient</a></li>
            <li><a href="/AppointmentScheduling.html">Appointments</a></li>
            <li><a href="/VitalsEntry.html" class="active">Vitals</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="form-container">
            <div class="form-header">
                <h1>Record Vitals</h1>
                <p>Enter patient vital signs for monitoring</p>
            </div>

            <!-- Vitals Entry Form -->
            <form action="/RecordVitals" method="POST"
                  onsubmit="return validateVitalsForm()">

                <!-- Patient ID (Dropdown) -->
                <div class="form-group">
                    <label for="patientId">Select Patient</label>
                    <select id="patientId" name="patientId" required>
                        <option value="">-- Loading patients... --</option>
                    </select>
                </div>

                <!-- Heart Rate -->
                <div class="form-group">
                    <label for="heartRate">Heart Rate (BPM)</label>
                    <input type="number" id="heartRate" name="heartRate"
                           placeholder="Normal range: 60–100 BPM" min="0" required>
                    <span class="hint">Valid range: 40 – 150 BPM</span>
                </div>

                <!-- Systolic Blood Pressure -->
                <div class="form-group">
                    <label for="systolicBP">Systolic Blood Pressure (mmHg)</label>
                    <input type="number" id="systolicBP" name="systolicBP"
                           placeholder="Normal range: 90–120 mmHg" min="0" required>
                </div>

                <!-- Temperature -->
                <div class="form-group">
                    <label for="temperature">Temperature (°C)</label>
                    <input type="number" id="temperature" name="temperature"
                           placeholder="Normal: 36.1–37.2 °C"
                           step="0.1" min="0" required>
                    <span class="hint">Valid range: 35.0 – 42.0 °C</span>
                </div>

                <!-- Submit -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        Record Vitals
                    </button>
                    <button type="reset" class="btn btn-secondary">
                        Clear Form
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2035 HealthLink Smart Hospital Management System. All rights reserved.</p>
    </footer>

    <!-- Validation Script -->
    <script src="js/validation.js"></script>

    <!-- Load dropdown dynamically -->
    <script>
        fetch('/api/patients')
            .then(r => r.json())
            .then(patients => {
                const sel = document.getElementById('patientId');
                sel.innerHTML = '<option value="">-- Select Patient --</option>';
                patients.forEach(p => {
                    sel.innerHTML += `<option value="${p.patientId}">ID: ${p.patientId} – ${p.name}</option>`;
                });
            });
    </script>
</body>
</html>
